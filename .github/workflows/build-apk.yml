name: Build Simple PDF Signer APK

on:
  workflow_dispatch:
  push:
    paths:
      - "Simple-Offline-PDF-Signer-Source.zip"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Download repository files
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses > /dev/null || true

      - name: Install Android SDK 35
        run: |
          sdkmanager             "platform-tools"             "platforms;android-35"             "build-tools;35.0.0"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Open source ZIP
        run: |
          test -s Simple-Offline-PDF-Signer-Source.zip
          rm -rf extracted
          mkdir extracted
          unzip -q Simple-Offline-PDF-Signer-Source.zip -d extracted
          test -f extracted/SimpleOfflinePdfSigner/settings.gradle
          test -f extracted/SimpleOfflinePdfSigner/app/build.gradle

      - name: Build APK
        working-directory: extracted/SimpleOfflinePdfSigner
        run: gradle --no-daemon clean assembleDebug --stacktrace --console=plain

      - name: Prepare APK
        run: |
          APK="extracted/SimpleOfflinePdfSigner/app/build/outputs/apk/debug/app-debug.apk"
          test -s "$APK"
          cp "$APK" Simple-Offline-PDF-Signer.apk
          sha256sum Simple-Offline-PDF-Signer.apk > Simple-Offline-PDF-Signer.apk.sha256

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Simple-Offline-PDF-Signer-APK
          path: |
            Simple-Offline-PDF-Signer.apk
            Simple-Offline-PDF-Signer.apk.sha256
          if-no-files-found: error
          retention-days: 30
          
